<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Chat Hub - Compare</title>
  <style>
    :root {
      --primary-color: #4285f4;
      --primary-color-soft: rgba(66, 133, 244, 0.12);
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface-2: #f7f8fa;
      --border: #e4e6eb;
      --border-strong: #d5d7dc;
      --fg: #1a1a1a;
      --fg-muted: #666;
      --accent-warning: #ff9800;
      --accent-danger: #f44336;
      --accent-success: #4caf50;
    }
    :root[data-theme="dark"] {
      --primary-color: #8ab4f8;
      --primary-color-soft: rgba(138, 180, 248, 0.18);
      --bg: #1f2023;
      --surface: #2a2c30;
      --surface-2: #34373c;
      --border: #3a3d42;
      --border-strong: #4a4d52;
      --fg: #e8eaed;
      --fg-muted: #a0a4ab;
      --accent-warning: #f7b75e;
      --accent-danger: #ef5350;
      --accent-success: #66bb6a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .hidden { display: none !important; }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .topbar .spacer { flex: 1; }
    .topbar select {
      background: var(--surface-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    #compareRoot {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ===== compare-controller styles (shared via compare.css) ===== */
  </style>
  <link rel="stylesheet" href="compare.css">
</head>
<body>
  <header class="topbar">
    <h1>AI Chat Hub · Compare</h1>
    <div class="spacer"></div>
    <select id="layoutSelect" title="Iframe layout">
      <option value="side-by-side-auto">Side-by-side (auto)</option>
      <option value="side-by-side">Side-by-side (fixed 420px)</option>
      <option value="auto">Auto grid (fit to width)</option>
      <option value="stack">Stack (1 column)</option>
      <option value="grid-2">2 columns</option>
      <option value="grid-3">3 columns</option>
      <option value="grid-4">4 columns</option>
      <option value="grid-5">5 columns</option>
    </select>
  </header>

  <main id="compareRoot"></main>

  <script src="prompt-library.js"></script>
  <script src="prompt-picker.js"></script>
  <script src="compare-controller.js"></script>
  <script src="compare.js"></script>
</body>
</html>
